name: dia60al40-dem
on:
  workflow_dispatch:
    inputs:
      e_al_e0_gpa:
        description: 'Smoothstep Al modulus at loose packing, GPa'
        required: false
        default: '5'
      e_al_emax_gpa:
        description: 'Smoothstep Al modulus near rho_total=0.95, GPa'
        required: false
        default: '12'
      e_al_emax_sweep_json:
        description: 'Optional JSON list for Emax sweep, e.g. ["10","12","14","16"]; empty uses e_al_emax_gpa'
        required: false
        default: ''
      e_diamond_gpa:
        description: 'Diamond DEM modulus, GPa'
        required: false
        default: '300'
      e_tool_gpa:
        description: 'Top tool DEM modulus, GPa'
        required: false
        default: '600'
      e_wall_gpa:
        description: 'Wall/die DEM modulus, GPa'
        required: false
        default: '200'
      mu_al_al:
        description: 'Al-Al friction coefficient'
        required: false
        default: '0.30'
      mu_al_diamond:
        description: 'Al-Diamond friction coefficient'
        required: false
        default: '0.30'
      mu_al_tool:
        description: 'Al-Tool friction coefficient'
        required: false
        default: '0.08'
      mu_al_wall:
        description: 'Al-Wall friction coefficient'
        required: false
        default: '0.08'
      mu_diamond_diamond:
        description: 'Diamond-Diamond friction coefficient'
        required: false
        default: '0.10'
      mu_diamond_tool:
        description: 'Diamond-Tool friction coefficient'
        required: false
        default: '0.08'
      mu_diamond_wall:
        description: 'Diamond-Wall friction coefficient'
        required: false
        default: '0.08'
      mu_scale_json:
        description: 'JSON list for mu sweep, e.g. ["0.7","1.0","1.3"]'
        required: false
        default: '["1.0"]'
      dem_seed_json:
        description: 'JSON list of reproducible DEM random-mixing seed indices, e.g. ["0","1","2","3","4"]'
        required: false
        default: '["0","1","2"]'
  push:
    paths:
      - 'python/**'
      - 'liggghts/**'
      - '.github/workflows/dia60al40-dem.yml'
      - 'scripts/**'

jobs:
  dem:
    name: dem Emax=${{ matrix.e_al_emax }}GPa mu_scale=${{ matrix.mu_scale }} seed=${{ matrix.dem_seed }}
    strategy:
      fail-fast: false
      matrix:
        mu_scale: ${{ fromJSON(inputs.mu_scale_json || '["1.0"]') }}
        e_al_emax: ${{ fromJSON(inputs.e_al_emax_sweep_json || format('["{0}"]', inputs.e_al_emax_gpa || '12')) }}
        dem_seed: ${{ fromJSON(inputs.dem_seed_json || '["0","1","2"]') }}
    # Ubuntu apt repos do NOT ship a working `liggghts` package, so we
    # build LIGGGHTS-PUBLIC from source. Use 22.04 because its older
    # g++ 11 tolerates the LIGGGHTS-PUBLIC codebase without -Werror noise.
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          # libopenmpi-dev gives us mpicxx so LIGGGHTS' `make auto` target works.
          # Without it, `make auto` aborts ("Could not find a suitable mpi compiler"),
          # and `make serial` also fails at link with "cannot find -lmpi_stubs"
          # unless src/STUBS is manually built first.
          sudo apt-get install -y build-essential gcc g++ gfortran make git \
                                   libopenmpi-dev openmpi-bin \
                                   python3 python3-pip python3-matplotlib
          which mpicxx
          mpicxx --version | head -1

      - name: Build LIGGGHTS-PUBLIC from source
        run: |
          set -euxo pipefail
          git clone --depth=1 https://github.com/CFDEMproject/LIGGGHTS-PUBLIC.git /tmp/lpub
          cd /tmp/lpub/src
          # Pre-build the MPI stubs so the `serial` fallback can link.
          ( cd STUBS && make 2>&1 | tail -10 )
          # Primary: MPI-enabled `auto` (real Open MPI, runs serially on 1 process).
          if ! make -j"$(nproc)" auto 2>&1 | tee /tmp/build_auto.log; then
            echo "[build] auto failed; falling back to serial with prebuilt mpi_stubs"
            make clean-all || true
            ( cd STUBS && make 2>&1 | tail -5 )   # clean-all may not touch STUBS, rebuild defensively
            make -j"$(nproc)" serial 2>&1 | tee /tmp/build_serial.log
          fi
          # Install whichever binary was produced.
          if [ -x lmp_auto ];   then sudo install -m 0755 lmp_auto   /usr/local/bin/liggghts; fi
          if [ -x lmp_serial ]; then sudo install -m 0755 lmp_serial /usr/local/bin/liggghts; fi
          which liggghts
          ls -la /usr/local/bin/liggghts
          # Sanity-check: must respond and identify itself as LIGGGHTS.
          # NOTE: do NOT pipe `liggghts -h` directly into `head` — with `set -o pipefail`,
          # `head` closes stdin after 40 lines and liggghts dies with SIGPIPE (exit 141),
          # which would fail the whole step even though the binary is perfectly fine.
          # Spill to a file first, then preview + assert.
          liggghts -h >/tmp/liggghts_help.txt 2>&1 || true
          head -40 /tmp/liggghts_help.txt
          grep -q "LIGGGHTS" /tmp/liggghts_help.txt

      - name: Prepare meshes
        run: |
          set -euxo pipefail
          python3 python/prepare_meshes.py
          find liggghts/meshes -maxdepth 1 -type f -ls
          # Hard-assert all three STLs were produced and are non-empty.
          # Catches silent regressions in prepare_meshes.py before LIGGGHTS gets a chance to die on a missing file.
          for f in DieBox.stl DieLeft.stl DieRight.stl DieBottom.stl DieFrontBack.stl TopPlate.stl InsertFace.stl; do
            test -s "liggghts/meshes/$f" || { echo "[FATAL] missing/empty mesh: liggghts/meshes/$f"; exit 1; }
          done

      - name: Render DEM parameter deck
        run: |
          set -euxo pipefail
          python3 python/render_dem_deck.py \
            --input liggghts/in.dia60al40_dem_staged.liggghts \
            --output liggghts/in.dia60al40_dem_staged.rendered.liggghts \
            --e-al-e0-gpa "${{ inputs.e_al_e0_gpa || '5' }}" \
            --e-al-emax-gpa "${{ matrix.e_al_emax }}" \
            --e-diamond-gpa "${{ inputs.e_diamond_gpa || '300' }}" \
            --e-tool-gpa "${{ inputs.e_tool_gpa || '600' }}" \
            --e-wall-gpa "${{ inputs.e_wall_gpa || '200' }}" \
            --mu-al-al "${{ inputs.mu_al_al || '0.30' }}" \
            --mu-al-diamond "${{ inputs.mu_al_diamond || '0.30' }}" \
            --mu-al-tool "${{ inputs.mu_al_tool || '0.08' }}" \
            --mu-al-wall "${{ inputs.mu_al_wall || '0.08' }}" \
            --mu-diamond-diamond "${{ inputs.mu_diamond_diamond || '0.10' }}" \
            --mu-diamond-tool "${{ inputs.mu_diamond_tool || '0.08' }}" \
            --mu-diamond-wall "${{ inputs.mu_diamond_wall || '0.08' }}" \
            --mu-scale "${{ matrix.mu_scale }}" \
            --seed-index "${{ matrix.dem_seed }}"
          sed -n '1,180p' liggghts/in.dia60al40_dem_staged.rendered.liggghts

      - name: Run staged DEM compaction
        working-directory: liggghts
        run: |
          set -euxo pipefail
          mkdir -p DEM
          echo '[PWD]' "$PWD"
          echo '[INPUT HEAD]'
          sed -n '1,180p' in.dia60al40_dem_staged.rendered.liggghts
          echo '[RUN LIGGGHTS]'
          # `-in file` is the canonical invocation; stdin redirect can swallow output on some builds.
          # `tee` reads until EOF — it does NOT close stdin early, so pipefail+SIGPIPE is not a concern here
          # (unlike the `liggghts -h | head -40` trap in the previous step). If liggghts exits non-zero,
          # pipefail correctly propagates the failure.
          liggghts -in in.dia60al40_dem_staged.rendered.liggghts 2>&1 | tee dia60al40_liggghts_staged.run.log
          echo '[OUTPUT TREE]'
          find . -maxdepth 3 -type f -ls | sort -k11
          test -s dia60al40_liggghts_staged.run.log

          # Gate 1: surface any LIGGGHTS-level ERROR explicitly.
          # pipefail above usually catches these, but printing the matching line(s) up-front
          # makes diagnosis instant instead of scrolling through thousands of thermo lines.
          if grep -E '^ERROR' dia60al40_liggghts_staged.run.log; then
            echo "[FATAL] LIGGGHTS reported an ERROR (see grep output above)."
            exit 1
          fi

          # Soft-warn (do not fail): "Lost atoms" means particles silently left the box.
          # The deck pins z via `setforce NULL NULL 0.0` so this should never happen,
          # but if it does we want it visible without burying the run.
          if grep -E 'Lost atoms|WARNING.*lost' dia60al40_liggghts_staged.run.log; then
            echo "[WARN] LIGGGHTS reported lost atoms — check physics, but not failing the step."
          fi

          # Gate 2: each staged handoff dump must exist.
          ls DEM/stage0_preload_*.dump
          ls DEM/stage1_rho065_*.dump
          ls DEM/stage2_rho072_*.dump
          ls DEM/stage3_rho080_*.dump
          ls DEM/stage4_rho088_*.dump
          ls DEM/stage5_rho095_*.dump

          # Gate 3: the FINAL dump must contain the exact target composition.
          # `insert/pack particles_in_region` is easy to misuse because the value is a
          # total target count, not the number inserted by that specific fix. The previous
          # loose >=30 gate allowed a green run with 26 Al + 8 DS + 0 DL. This gate forbids
          # that second-order false success. Projected 2D overlap is diagnostic-only here:
          # compressed Hertz DEM stages normally contain overlap, and the COMSOL geometry
          # converter removes it with a documented radius shrink.
          LAST_DUMP=$(ls -1 DEM/stage5_rho095_*.dump | sort -V | tail -1)
          echo "[VERIFY] last dump: $LAST_DUMP"
          python3 ../python/verify_liggghts_dump.py --input "$LAST_DUMP" --expect-al 34 --expect-ds 8 --expect-dl 8

          # Gate 4: verify every stage against expected density windows and 2D
          # COMSOL handoff constraints. Overlap is reported, not failed, because it
          # is contact deformation in DEM. z drift and composition still fail.
          cd ..
          python3 python/verify_dem_stages.py --root liggghts/DEM
          test -s liggghts/DEM/pressure_density_curve_raw.csv

          # Export every stage into COMSOL-ready CSV. COMSOL can now analyze
          # local stress/plasticity per packed state instead of solving the
          # entire DEM rearrangement itself. The legacy comsol_particles CSV is
          # geometry-safe: it shrinks radii just enough to remove DEM Hertz overlap.
          # The richer dem_fem_handoff CSV preserves raw DEM radii and contact counts.
          for stage in stage0_preload stage1_rho065 stage2_rho072 stage3_rho080 stage4_rho088 stage5_rho095; do
            dump=$(ls -1 "liggghts/DEM/${stage}_"*.dump | sort -V | tail -1)
            python3 python/convert_liggghts_csv_to_comsol.py \
              --input "$dump" \
              --mode 2d \
              --auto-shrink-overlap \
              --clearance-um 0.02 \
              --output "liggghts/DEM/comsol_particles_${stage}.csv"
            python3 python/export_dem_stage_handoff.py \
              --input "$dump" \
              --stage-id "$stage" \
              --output "liggghts/DEM/dem_fem_handoff_${stage}.csv"
          done

          # Main project result: 2D DEM pressure-density curve. This is the
          # primary output for estimating the punch pressure required to reach
          # rho_total ~= 0.95.
          python3 python/export_pressure_density_curve.py \
            --root liggghts/DEM \
            --raw liggghts/DEM/pressure_density_curve_raw.csv \
            --output liggghts/DEM/pressure_density_curve.csv
          echo '[PRESSURE-DENSITY CURVE]'
          cat liggghts/DEM/pressure_density_curve.csv
          python3 python/analyze_pressure_density.py \
            --curve liggghts/DEM/pressure_density_curve.csv \
            --output liggghts/DEM/pressure_density_summary.csv \
            --target-rho 0.95 \
            --target-pressure-mpa 200
          cat liggghts/DEM/pressure_density_summary.csv
          python3 python/plot_dem_results.py \
            --root liggghts/DEM \
            --curve liggghts/DEM/pressure_density_curve.csv \
            --outdir liggghts/DEM/plots
          python3 python/plot_plastic_morphology.py \
            --root liggghts/DEM \
            --outdir liggghts/DEM/plots \
            --metrics liggghts/DEM/plastic_morphology_metrics.csv
          python3 python/verify_plastic_morphology.py \
            --metrics liggghts/DEM/plastic_morphology_metrics.csv
          find liggghts/DEM/plots -maxdepth 1 -type f -ls | sort -k11

      - name: Upload DEM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dia60al40-dem-artifacts-Emax${{ matrix.e_al_emax }}-mu${{ matrix.mu_scale }}-seed${{ matrix.dem_seed }}
          path: |
            liggghts/DEM/**
            liggghts/*.log
            liggghts/*.liggghts
            liggghts/meshes/*.stl

  ensemble:
    name: aggregate DEM seed ensemble
    needs: dem
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install plotting dependency
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y python3 python3-matplotlib

      - name: Download DEM artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dia60al40-dem-artifacts-*
          path: ensemble_inputs
          merge-multiple: false

      - name: Aggregate seed ensemble
        run: |
          set -euxo pipefail
          find ensemble_inputs -maxdepth 3 -type f | sort | head -80
          python3 python/aggregate_ensemble_results.py \
            --root ensemble_inputs \
            --outdir ensemble_summary
          cat ensemble_summary/ensemble_runs.csv
          cat ensemble_summary/ensemble_pressure_summary.csv

      - name: Upload ensemble summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dia60al40-dem-ensemble-summary
          path: ensemble_summary/**
