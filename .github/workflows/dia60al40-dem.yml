name: dia60al40-dem
on:
  workflow_dispatch:
  push:
    paths:
      - 'python/**'
      - 'liggghts/**'
      - '.github/workflows/dia60al40-dem.yml'
      - 'scripts/**'

jobs:
  dem:
    # Ubuntu apt repos do NOT ship a working `liggghts` package, so we
    # build LIGGGHTS-PUBLIC from source. Use 22.04 because its older
    # g++ 11 tolerates the LIGGGHTS-PUBLIC codebase without -Werror noise.
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          # libopenmpi-dev gives us mpicxx so LIGGGHTS' `make auto` target works.
          # Without it, `make auto` aborts ("Could not find a suitable mpi compiler"),
          # and `make serial` also fails at link with "cannot find -lmpi_stubs"
          # unless src/STUBS is manually built first.
          sudo apt-get install -y build-essential gcc g++ gfortran make git \
                                   libopenmpi-dev openmpi-bin \
                                   python3 python3-pip
          which mpicxx
          mpicxx --version | head -1

      - name: Build LIGGGHTS-PUBLIC from source
        run: |
          set -euxo pipefail
          git clone --depth=1 https://github.com/CFDEMproject/LIGGGHTS-PUBLIC.git /tmp/lpub
          cd /tmp/lpub/src
          # Pre-build the MPI stubs so the `serial` fallback can link.
          ( cd STUBS && make 2>&1 | tail -10 )
          # Primary: MPI-enabled `auto` (real Open MPI, runs serially on 1 process).
          if ! make -j"$(nproc)" auto 2>&1 | tee /tmp/build_auto.log; then
            echo "[build] auto failed; falling back to serial with prebuilt mpi_stubs"
            make clean-all || true
            ( cd STUBS && make 2>&1 | tail -5 )   # clean-all may not touch STUBS, rebuild defensively
            make -j"$(nproc)" serial 2>&1 | tee /tmp/build_serial.log
          fi
          # Install whichever binary was produced.
          if [ -x lmp_auto ];   then sudo install -m 0755 lmp_auto   /usr/local/bin/liggghts; fi
          if [ -x lmp_serial ]; then sudo install -m 0755 lmp_serial /usr/local/bin/liggghts; fi
          which liggghts
          ls -la /usr/local/bin/liggghts
          # Sanity-check: must respond and identify itself as LIGGGHTS.
          # NOTE: do NOT pipe `liggghts -h` directly into `head` — with `set -o pipefail`,
          # `head` closes stdin after 40 lines and liggghts dies with SIGPIPE (exit 141),
          # which would fail the whole step even though the binary is perfectly fine.
          # Spill to a file first, then preview + assert.
          liggghts -h >/tmp/liggghts_help.txt 2>&1 || true
          head -40 /tmp/liggghts_help.txt
          grep -q "LIGGGHTS" /tmp/liggghts_help.txt

      - name: Prepare meshes
        run: |
          set -euxo pipefail
          python3 python/prepare_meshes.py
          find liggghts/meshes -maxdepth 1 -type f -ls
          # Hard-assert all three STLs were produced and are non-empty.
          # Catches silent regressions in prepare_meshes.py before LIGGGHTS gets a chance to die on a missing file.
          for f in DieBox.stl TopPlate.stl InsertFace.stl; do
            test -s "liggghts/meshes/$f" || { echo "[FATAL] missing/empty mesh: liggghts/meshes/$f"; exit 1; }
          done

      - name: Run DEM preload
        working-directory: liggghts
        run: |
          set -euxo pipefail
          mkdir -p DEM
          echo '[PWD]' "$PWD"
          echo '[INPUT HEAD]'
          sed -n '1,120p' in.dia60al40_dem_preload.liggghts
          echo '[RUN LIGGGHTS]'
          # `-in file` is the canonical invocation; stdin redirect can swallow output on some builds.
          # `tee` reads until EOF — it does NOT close stdin early, so pipefail+SIGPIPE is not a concern here
          # (unlike the `liggghts -h | head -40` trap in the previous step). If liggghts exits non-zero,
          # pipefail correctly propagates the failure.
          liggghts -in in.dia60al40_dem_preload.liggghts 2>&1 | tee dia60al40_liggghts.run.log
          echo '[OUTPUT TREE]'
          find . -maxdepth 3 -type f -ls | sort -k11
          test -s dia60al40_liggghts.run.log

          # Gate 1: surface any LIGGGHTS-level ERROR explicitly.
          # pipefail above usually catches these, but printing the matching line(s) up-front
          # makes diagnosis instant instead of scrolling through thousands of thermo lines.
          if grep -E '^ERROR' dia60al40_liggghts.run.log; then
            echo "[FATAL] LIGGGHTS reported an ERROR (see grep output above)."
            exit 1
          fi

          # Soft-warn (do not fail): "Lost atoms" means particles silently left the box.
          # The deck pins z via `setforce NULL NULL 0.0` so this should never happen,
          # but if it does we want it visible without burying the run.
          if grep -E 'Lost atoms|WARNING.*lost' dia60al40_liggghts.run.log; then
            echo "[WARN] LIGGGHTS reported lost atoms — check physics, but not failing the step."
          fi

          # Gate 2: at least one timestep dump must exist (file presence).
          ls DEM/dia60al40_*.dump

          # Gate 3: the FINAL dump must contain the exact target composition.
          # `insert/pack particles_in_region` is easy to misuse because the value is a
          # total target count, not the number inserted by that specific fix. The previous
          # loose >=30 gate allowed a green run with 26 Al + 8 DS + 0 DL. This gate forbids
          # that second-order false success.
          LAST_DUMP=$(ls -1 DEM/dia60al40_*.dump | sort -V | tail -1)
          echo "[VERIFY] last dump: $LAST_DUMP"
          python3 ../python/verify_liggghts_dump.py --input "$LAST_DUMP" --expect-al 34 --expect-ds 8 --expect-dl 4

      - name: Upload DEM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dia60al40-dem-artifacts
          path: |
            liggghts/DEM/**
            liggghts/*.log
            liggghts/meshes/*.stl
